services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      # Overrides whatever DATABASE_URL is in .env (set for host-side `npm run
      # dev` against localhost) -- inside the Compose network the db service
      # is reachable by its service name, not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
